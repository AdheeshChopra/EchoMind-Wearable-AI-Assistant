services:
  db:
    image: ankane/pgvector
    ports:
      - '5433:5432'
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: echomind
    volumes:
      - postgres_data:/var/lib/postgresql/data
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    ports:
      - '8000:8000'
    environment:
      - WHISPER_MODEL=tiny.en
  redis:
    image: redis:alpine
    ports:
      - '6379:6379'
volumes:
  postgres_data: